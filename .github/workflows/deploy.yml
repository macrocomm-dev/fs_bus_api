# ---------------------------------------------------------------------------
# CI/CD — FS Bus API
#
# Triggers on every push to main:
#   1. Runs tests
#   2. Builds Docker image and pushes to Artifact Registry
#   3. Deploys to Cloud Run
#
# Required GitHub Actions secrets:
#   GCP_SA_KEY            — service account key JSON (base64-encoded)
#   GCP_PROJECT_ID        — GCloud project ID (e.g. bus_track)
#   GCP_REGION            — Cloud Run / Artifact Registry region (e.g. us-central1)
#   CLOUD_SQL_INSTANCE    — Cloud SQL connection name (<project>:<region>:<instance>)
#   ARTIFACT_REGISTRY_REPO — Artifact Registry repository name (e.g. fs-bus-api)
#   CLOUD_RUN_SERVICE     — Cloud Run service name (e.g. fs-bus-api)
# ---------------------------------------------------------------------------

name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  ARTIFACT_REGISTRY_REPO: ${{ secrets.ARTIFACT_REGISTRY_REPO }}
  CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
  IMAGE_NAME: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPO }}/fs-bus-api

jobs:
  # --------------------------------------------------------------------------
  # Test
  # --------------------------------------------------------------------------
  test:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          if [ -d tests ]; then
            python -m pytest tests/ -v
          else
            echo "No tests directory found — skipping."
          fi

  # --------------------------------------------------------------------------
  # Build & Push Docker image (only on push to main)
  # --------------------------------------------------------------------------
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag "${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --tag "${{ env.IMAGE_NAME }}:latest" \
            .

      - name: Push Docker image
        run: |
          docker push "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker push "${{ env.IMAGE_NAME }}:latest"

  # --------------------------------------------------------------------------
  # Deploy to Cloud Run
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.CLOUD_RUN_SERVICE }}" \
            --image "${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --platform managed \
            --no-allow-unauthenticated \
            --add-cloudsql-instances "${{ secrets.CLOUD_SQL_INSTANCE }}" \
            --set-secrets="SECRET_KEY=api-secret-key:latest,DB_PASSWORD=db-password:latest,DB_NAME=db-name:latest,DB_USER=db-user:latest" \
            --set-env-vars="GOOGLE_CLOUD_PROJECT=${{ env.GCP_PROJECT_ID }},DB_HOST=/cloudsql/${{ secrets.CLOUD_SQL_INSTANCE }}" \
            --quiet

      - name: Show service URL
        run: |
          gcloud run services describe "${{ env.CLOUD_RUN_SERVICE }}" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --format "value(status.url)"
